<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { font-family: -apple-system, sans-serif; background: #f4f7f6; }</style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm"><div class="container"><a class="navbar-brand fw-bold" href="/">🌍 YatraGen Pro</a></div></nav>
    <div class="container py-4">
        <h2 class="mb-4 fw-bold">Saved Journeys</h2>
        <div class="accordion shadow-sm" id="tripAcc">
            {% for trip in trips %}
            <div class="accordion-item mb-2 border-0">
                <h2 class="accordion-header d-flex align-items-center bg-white border-bottom">
                    <button class="accordion-button collapsed py-3" data-bs-toggle="collapse" data-bs-target="#c{{ trip.id }}">
                        <div class="d-flex justify-content-between w-100 me-3">
                            <strong>📍 {{ trip.destination }}</strong>
                            <small class="text-muted">{{ trip.created_at|date:"d M Y | h:i A" }}</small>
                        </div>
                    </button>
                    <form action="{% url 'delete_trip' trip.id %}" method="POST" class="me-2" onsubmit="return confirm('Delete this itinerary?');">
                        {% csrf_token %}<button type="submit" class="btn btn-sm btn-outline-danger border-0">🗑️</button>
                    </form>
                </h2>
                <div id="c{{ trip.id }}" class="accordion-collapse collapse" data-bs-parent="#tripAcc">
                    <div class="accordion-body bg-white border-top">{{ trip.itinerary_html|safe }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% if not trips %}<p class="text-center text-muted py-5">No saved trips yet.</p>{% endif %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
